name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Install Compatible Gradle and Generate Wrapper
      run: |
        wget https://services.gradle.org/distributions/gradle-7.3.3-bin.zip
        unzip -q gradle-7.3.3-bin.zip
        ./gradle-7.3.3/bin/gradle wrapper --gradle-version 7.3.3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build
